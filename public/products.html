<!DOCTYPE html>
<html>

<head>

    <title>ShopEase - Products</title>

    <link rel="stylesheet" href="css/products.css">

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">

        <div class="logo">
            Shop<span>Ease</span>
        </div>

        <div class="search-box">
            <input
                type="text"
                id="search"
                placeholder="Search Products..."
                onkeyup="searchProducts()">
        </div>

        <div class="nav-buttons">

            <button onclick="window.location.href='wishlist.html'">
                ❤️ Wishlist
            </button>

            <button onclick="window.location.href='cart.html'">
                🛒 Cart
            </button>

            <button onclick="logout()">
                Logout
            </button>

        </div>

    </nav>

<!-- Category Section -->

<div class="category-section">

    <div class="category-card" onclick="filterCategory('All')">🏠<h4>All</h4></div>

    <div class="category-card" onclick="filterCategory('Laptop')">💻<h4>Laptop</h4></div>

    <div class="category-card" onclick="filterCategory('Mobile')">📱<h4>Mobile</h4></div>

    <div class="category-card" onclick="filterCategory('Shoes')">👟<h4>Shoes</h4></div>

    <div class="category-card" onclick="filterCategory('Clothes')">👕<h4>Clothes</h4></div>

    <div class="category-card" onclick="filterCategory('Speaker')">🔊<h4>Speaker</h4></div>

    <div class="category-card" onclick="filterCategory('Watch')">⌚<h4>Watch</h4></div>

</div>

<!-- Products -->

<div id="products" class="products-container"></div>

<script src="js/products.js"></script>

</body>
</html>
