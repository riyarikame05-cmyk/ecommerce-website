<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet" href="css/loader.css">
    <title>ShopEase - Products</title>

    <link rel="stylesheet" href="css/products.css">

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">

        <div class="logo">
            Shop<span>Ease</span>
        </div>

        <div class="search-box">
            <input
                type="text"
                id="search"
                placeholder="Search Products..."
                onkeyup="searchProducts()">
        </div>

        <div class="nav-buttons">

            <button onclick="window.location.href='wishlist.html'">
                ❤️ Wishlist
            </button>

            <button onclick="window.location.href='cart.html'">
                🛒 Cart
            </button>

            <button onclick="logout()">
                Logout
            </button>

        </div>

    </nav>

<!-- Category Section -->

<div class="category-section">

    <div class="category-card" onclick="filterCategory('All')">🏠<h4>All</h4></div>

    <div class="category-card" onclick="filterCategory('Laptop')">💻<h4>Laptop</h4></div>

    <div class="category-card" onclick="filterCategory('Mobile')">📱<h4>Mobile</h4></div>

    <div class="category-card" onclick="filterCategory('Shoes')">👟<h4>Shoes</h4></div>

    <div class="category-card" onclick="filterCategory('Clothes')">👕<h4>Clothes</h4></div>

    <div class="category-card" onclick="filterCategory('Speaker')">🔊<h4>Speaker</h4></div>

    <div class="category-card" onclick="filterCategory('Watch')">⌚<h4>Watch</h4></div>

</div>
<select id="priceFilter" onchange="filterByPrice()">
    <option value="">All Prices</option>
    <option value="0-500">₹0 - ₹500</option>
    <option value="500-1000">₹500 - ₹1000</option>
    <option value="1000-5000">₹1000 - ₹5000</option>
    <option value="5000-10000">₹5000 - ₹10000</option>
    <option value="10000">Above ₹10000</option>
</select>
<!-- Products -->

<div id="products" class="products-container"></div>

<script src="js/products.js"></script>
<div id="loader" class="loader hidden">
    <div class="spinner"></div>
</div>
</body>
</html>
