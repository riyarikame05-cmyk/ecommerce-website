<!DOCTYPE html>
<html lang="en">

<head>
<link rel="stylesheet" href="css/loader.css">
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>User Dashboard</title>

    <link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

    <nav>

        <div class="logo">

            🛍 ShopEase

        </div>

        <div class="user">

            👤 Welcome User

        </div>

    </nav>

    <div class="container">

        <div class="welcome-card">

            <h1>Welcome Back 👋</h1>

            <p>
                Glad to see you again. Continue your shopping journey.
            </p>

        </div>

        <div class="cards">

            <div class="card">
                <h2>🛒</h2>
                <h3>Products</h3>

                <a href="products.html">
                    View Products
                </a>

            </div>

            <div class="card">
                <h2>🛍</h2>
                <h3>My Cart</h3>

                <a href="cart.html">
                    Open Cart
                </a>

            </div>

            <div class="card">
                <h2>📦</h2>
                <h3>My Orders</h3>

                <a href="orders.html">
                    View Orders
                </a>

            </div>

            <div class="card">

                <h2>🚪</h2>

                <h3>Logout</h3>

                <a href="#" onclick="logout()">
                    Logout
                </a>

            </div>

        </div>

    </div>

<script>

function logout(){

localStorage.removeItem("token");

window.location.href="login.html";

}

</script>
<div id="loader" class="loader hidden">
    <div class="spinner"></div>
</div>
